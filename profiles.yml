calendar:
  target: default
  outputs:
    default:
      type: duckdb
      path: "md:?motherduck_token={{ env_var('MOTHERDUCK_TOKEN', '') }}"
      database: calendar
      schema: main
      threads: 4
      extensions:
        - httpfs
        - motherduck
        - ducklake
      attach:
        - path: "md:calendar"
          alias: calendar
          is_ducklake: true
    local:
      type: duckdb
      path: "md:?motherduck_token={{ env_var('MOTHERDUCK_TOKEN', '') }}"
      database: calendar
      schema: main
      threads: 4
      extensions:
        - httpfs
        - motherduck
        - ducklake
      attach:
        - path: "md:dev_calendar"
          alias: calendar
          is_ducklake: true
